security:
    password_hashers:
        Symfony\Component\Security\Core\User\InMemoryUser: 'auto'

    providers:
        admin_provider:
            memory:
                users:
                    admin:
                        password: '%env(ADMIN_PASSWORD_HASH)%'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|assets|build)/
            security: false
        admin:
            pattern: ^/(admin|login|logout)
            lazy: true
            provider: admin_provider
            form_login:
                login_path: login
                check_path: login
                default_target_path: admin_index
                username_parameter: username
                password_parameter: password
            logout:
                path: logout
                target: login
        main:
            lazy: true

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
